<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <!-- Tab Bar -->
        <nav class="tab-bar" id="tab-bar">
            <button class="tab-item active" data-tab="orders">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                Orders
            </button>
            <button class="tab-item" data-tab="analytics">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
                Analytics
            </button>
            <button class="tab-item" data-tab="accounts">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                Accounts
            </button>
            <button class="tab-item" data-tab="settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                </svg>
                Settings
            </button>

            <div class="tab-bar-actions">
                <button id="sync-btn" class="sync-btn">
                    <span class="sync-icon">&#8635;</span> Sync
                </button>
                <div class="account-area">
                    <select id="account-select" class="header-account-select" style="display: none;">
                        <option value="">All Accounts</option>
                    </select>
                    <img id="account-avatar" class="account-avatar" src="" alt="" style="display: none;" title="Manage accounts">
                    <div id="account-avatar-fallback" class="account-avatar-fallback" style="display: none;" title="Manage accounts"></div>
                </div>
            </div>

            <div class="tab-bar-indicator"></div>
        </nav>

        <!-- Sync Progress (visible on all tabs) -->
        <div id="sync-progress" class="sync-progress" style="display: none;">
            <div class="sync-progress-bar">
                <div class="sync-progress-fill" id="sync-progress-fill"></div>
            </div>
            <div class="sync-progress-text" id="sync-progress-text"></div>
        </div>

        <!-- Tab Content -->
        <div class="tab-content">
            <!-- Orders Tab -->
            <div class="tab-panel active" id="panel-orders">
                <div class="orders-layout">
                    <!-- Sidebar -->
                    <aside class="sidebar">
                        <div class="sidebar-header">
                            <div class="sidebar-title">Total Orders</div>
                            <div id="total-count" class="sidebar-count">--</div>
                        </div>

                        <div class="filter-section">
                            <div class="filter-label">Status</div>
                            <div id="status-filters">
                                <div class="filter-item active" data-filter="all">
                                    <span class="filter-dot" style="background: var(--text-secondary);"></span>
                                    All Orders
                                    <span class="filter-count" id="count-all">--</span>
                                </div>
                                <div class="filter-item" data-filter="confirmed">
                                    <span class="filter-dot" style="background: var(--accent-blue);"></span>
                                    Confirmed
                                    <span class="filter-count" id="count-confirmed">--</span>
                                </div>
                                <div class="filter-item" data-filter="shipped">
                                    <span class="filter-dot" style="background: var(--accent-orange);"></span>
                                    Shipped
                                    <span class="filter-count" id="count-shipped">--</span>
                                </div>
                                <div class="filter-item" data-filter="delivered">
                                    <span class="filter-dot" style="background: var(--accent-green);"></span>
                                    Delivered
                                    <span class="filter-count" id="count-delivered">--</span>
                                </div>
                                <div class="filter-item" data-filter="canceled">
                                    <span class="filter-dot" style="background: var(--accent-red);"></span>
                                    Canceled
                                    <span class="filter-count" id="count-canceled">--</span>
                                </div>
                            </div>
                        </div>

                        <!-- Date Range Filter -->
                        <div class="filter-section" id="date-range-section">
                            <div class="filter-label">Date Range</div>
                            <div class="date-presets">
                                <button class="date-preset" data-days="1">24h</button>
                                <button class="date-preset" data-days="7">7d</button>
                                <button class="date-preset" data-days="30">30d</button>
                                <button class="date-preset" data-days="90">90d</button>
                                <button class="date-preset active" data-days="0">All</button>
                            </div>
                        </div>

                        <div style="margin-top: auto; padding: 8px; font-size: 11px; color: var(--text-tertiary);">
                            <span id="pending-emails">-- pending</span>
                        </div>
                    </aside>

                    <!-- Main Content -->
                    <main class="main-content">
                        <div class="content-header">
                            <div>
                                <div class="content-title" id="filter-title">All Orders</div>
                                <div class="content-subtitle" id="last-updated">Loading...</div>
                            </div>
                            <div class="search-wrapper">
                                <span class="search-icon">&#8981;</span>
                                <input id="search-input" class="search-input" type="text" placeholder="Search orders, products, status...">
                            </div>
                        </div>

                        <div class="order-list" id="order-list">
                            <!-- Loading skeleton -->
                            <div class="order-item">
                                <div class="skeleton" style="width: 56px; height: 56px; border-radius: 10px;"></div>
                                <div class="order-main">
                                    <div class="skeleton" style="width: 140px; height: 16px; margin-bottom: 6px;"></div>
                                    <div class="skeleton" style="width: 80px; height: 14px;"></div>
                                </div>
                                <div class="skeleton" style="width: 70px; height: 24px; border-radius: 12px;"></div>
                                <div class="skeleton" style="width: 50px; height: 14px;"></div>
                            </div>
                        </div>

                        <div class="app-footer">
                            <span id="last-updated-footer">Walmart Order Tracker</span>
                        </div>
                    </main>
                </div>
            </div>

            <!-- Analytics Tab -->
            <div class="tab-panel" id="panel-analytics">
                <div class="analytics-content" id="analytics-content"></div>
            </div>

            <!-- Accounts Tab -->
            <div class="tab-panel" id="panel-accounts">
                <div class="accounts-content" id="accounts-content"></div>
            </div>

            <!-- Settings Tab -->
            <div class="tab-panel" id="panel-settings">
                <div class="settings-content" id="settings-content"></div>
            </div>
        </div>
    </div>

    <div id="account-modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Manage Connected Accounts</h2>
                <button class="modal-close">&#10005;</button>
            </div>
            <div class="modal-body" id="account-modal-body"></div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
