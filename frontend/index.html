<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders</title>
    <link rel="stylesheet" href="styles/tailwind.css">
    <style>
        :root {
            --bg-primary: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --bg-tertiary: #3a3a3c;
            --bg-hover: #48484a;
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --text-tertiary: #636366;
            --border-color: #38383a;
            --accent-blue: #0a84ff;
            --accent-green: #30d158;
            --accent-orange: #ff9f0a;
            --accent-red: #ff453a;
            --accent-purple: #bf5af2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            /* Let Windows use native ClearType rendering for sharper fonts */
            -webkit-font-smoothing: auto;
            text-rendering: optimizeLegibility;
            font-feature-settings: "kern" 1;
        }

        .app-container {
            display: grid;
            grid-template-columns: 220px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background-color: rgba(44, 44, 46, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 8px 8px 16px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .sidebar-count {
            font-size: 28px;
            font-weight: 300;
            color: var(--text-primary);
        }

        .filter-section {
            margin-bottom: 24px;
        }

        .filter-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            padding: 0 8px;
            margin-bottom: 8px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.15s;
            font-size: 13px;
            color: var(--text-primary);
        }

        .filter-item:hover {
            background-color: var(--bg-tertiary);
        }

        .filter-item.active {
            background-color: var(--accent-blue);
        }

        .filter-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .filter-count {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .filter-item.active .filter-count {
            color: rgba(255,255,255,0.8);
        }

        /* Stats section */
        .stats-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            font-size: 12px;
        }

        .stat-label {
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--text-primary);
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        /* Main content */
        .main-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-secondary);
        }

        .content-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .content-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Order list */
        .order-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .order-item {
            display: grid;
            grid-template-columns: 140px 1fr auto auto auto auto;
            gap: 16px;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .order-item:hover {
            background-color: var(--bg-secondary);
        }

        .order-item.expanded {
            background-color: var(--bg-secondary);
        }

        .order-main {
            min-width: 0;
        }

        .order-id {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .order-date {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .order-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            text-transform: capitalize;
        }

        .status-confirmed { background: rgba(10, 132, 255, 0.2); color: #4da3ff; }
        .status-shipped { background: rgba(255, 159, 10, 0.2); color: #ffb340; }
        .status-delivered { background: rgba(48, 209, 88, 0.2); color: #5ee07a; }
        .status-canceled { background: rgba(255, 69, 58, 0.2); color: #ff6b63; }
        .status-partially_canceled { background: rgba(191, 90, 242, 0.2); color: #cc7df5; }

        .order-items-count {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
            min-width: 60px;
        }

        .order-product {
            font-size: 11px;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .order-price {
            font-size: 12px;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            min-width: 60px;
            text-align: right;
        }

        .order-qty {
            font-size: 12px;
            color: var(--text-tertiary);
            font-variant-numeric: tabular-nums;
            min-width: 40px;
            text-align: right;
        }

        .sort-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .sort-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .sort-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        /* Expanded order details */
        .order-details {
            display: none;
            padding: 0 20px 16px 20px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .order-details.show {
            display: block;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .detail-section h4 {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 13px;
            color: var(--text-primary);
        }

        .detail-link {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .detail-link:hover {
            text-decoration: underline;
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-list li {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-qty {
            color: var(--text-tertiary);
            font-size: 11px;
        }

        .item-canceled {
            text-decoration: line-through;
            color: var(--accent-red);
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Footer */
        .app-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border-color);
            font-size: 11px;
            color: var(--text-tertiary);
            background-color: var(--bg-secondary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* Skeleton loading */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Tracking status styles */
        .tracking-section {
            grid-column: span 2;
        }

        .tracking-status-container {
            margin-top: 8px;
        }

        .tracking-status {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tracking-badge {
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-gray { background: rgba(152, 152, 157, 0.2); color: #98989d; }
        .badge-blue { background: rgba(10, 132, 255, 0.2); color: #4da3ff; }
        .badge-yellow { background: rgba(255, 159, 10, 0.2); color: #ffb340; }
        .badge-green { background: rgba(48, 209, 88, 0.2); color: #5ee07a; }
        .badge-red { background: rgba(255, 69, 58, 0.2); color: #ff6b63; }
        .badge-purple { background: rgba(191, 90, 242, 0.2); color: #cc7df5; }

        .tracking-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .delivery-date {
            font-size: 11px;
            color: var(--accent-green);
        }

        .tracking-events {
            margin-top: 8px;
            padding-left: 8px;
            border-left: 2px solid var(--border-color);
        }

        .tracking-event {
            font-size: 11px;
            padding: 4px 0;
        }

        .event-time {
            color: var(--text-tertiary);
            margin-right: 8px;
        }

        .event-desc {
            color: var(--text-secondary);
        }

        .event-loc {
            display: block;
            color: var(--text-tertiary);
            font-size: 10px;
            margin-top: 2px;
        }

        .tracking-fetched {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-top: 8px;
        }

        /* FedEx-style tracking timeline */
        .tracking-timeline {
            margin-top: 12px;
        }

        .timeline-date-group {
            margin-bottom: 16px;
        }

        .timeline-date {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border-color);
        }

        .timeline-event {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 12px;
            padding: 6px 0;
            font-size: 12px;
            align-items: baseline;
        }

        .timeline-time {
            color: var(--text-tertiary);
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .timeline-desc {
            color: var(--text-primary);
        }

        .timeline-loc {
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 11px;
        }

        .fetch-tracking-btn {
            margin-top: 8px;
            padding: 6px 12px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .fetch-tracking-btn:hover {
            background: #2998ff;
        }

        .fetch-tracking-btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-tertiary);
            cursor: wait;
        }

        .fetch-tracking-btn.loading {
            position: relative;
            color: transparent;
        }

        .fetch-tracking-btn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 14px;
            height: 14px;
            margin: -7px 0 0 -7px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Account selector */
        .account-section {
            padding: 12px 10px;
            border-top: 1px solid var(--border-color);
            margin-top: 16px;
        }

        .account-select {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2398989d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            padding-right: 32px;
        }

        .account-select:hover {
            border-color: var(--text-tertiary);
        }

        .account-select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .account-select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 8px;
        }

        .account-section .filter-label {
            margin-bottom: 8px;
        }

        /* Date range presets */
        .date-presets {
            display: flex;
            gap: 6px;
            padding: 0 8px;
        }

        .date-preset {
            flex: 1;
            padding: 6px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .date-preset:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .date-preset.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">Total Orders</div>
                <div id="total-count" class="sidebar-count">--</div>
            </div>

            <div class="filter-section">
                <div class="filter-label">Status</div>
                <div id="status-filters">
                    <div class="filter-item active" data-filter="all">
                        <span class="filter-dot" style="background: var(--text-secondary);"></span>
                        All Orders
                        <span class="filter-count" id="count-all">--</span>
                    </div>
                    <div class="filter-item" data-filter="confirmed">
                        <span class="filter-dot" style="background: var(--accent-blue);"></span>
                        Confirmed
                        <span class="filter-count" id="count-confirmed">--</span>
                    </div>
                    <div class="filter-item" data-filter="shipped">
                        <span class="filter-dot" style="background: var(--accent-orange);"></span>
                        Shipped
                        <span class="filter-count" id="count-shipped">--</span>
                    </div>
                    <div class="filter-item" data-filter="delivered">
                        <span class="filter-dot" style="background: var(--accent-green);"></span>
                        Delivered
                        <span class="filter-count" id="count-delivered">--</span>
                    </div>
                    <div class="filter-item" data-filter="canceled">
                        <span class="filter-dot" style="background: var(--accent-red);"></span>
                        Canceled
                        <span class="filter-count" id="count-canceled">--</span>
                    </div>
                </div>
            </div>

            <!-- Date Range Filter -->
            <div class="filter-section" id="date-range-section">
                <div class="filter-label">Date Range</div>
                <div class="date-presets">
                    <button class="date-preset" data-days="7">7d</button>
                    <button class="date-preset" data-days="30">30d</button>
                    <button class="date-preset" data-days="90">90d</button>
                    <button class="date-preset active" data-days="0">All</button>
                </div>
            </div>

            <!-- Stats Dashboard -->
            <div class="stats-section">
                <div class="filter-label">Statistics</div>
                <div class="stat-item">
                    <span class="stat-label">Total Spent</span>
                    <span class="stat-value" id="stat-total-spent">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Qty</span>
                    <span class="stat-value" id="stat-total-qty">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Avg Order</span>
                    <span class="stat-value" id="stat-avg-order">--</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">This Week</span>
                    <span class="stat-value" id="stat-this-week">--</span>
                </div>
            </div>

            <!-- Account Selector -->
            <div class="account-section" id="account-section" style="display: none;">
                <div class="filter-label">Account</div>
                <select id="account-select" class="account-select" onchange="handleAccountChange(this.value)">
                    <option value="">All Accounts</option>
                    <!-- Populated dynamically -->
                </select>
            </div>

            <div style="margin-top: auto; padding: 8px; font-size: 11px; color: var(--text-tertiary);">
                <span id="pending-emails">-- pending</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-header">
                <div>
                    <div class="content-title" id="filter-title">All Orders</div>
                    <div class="content-subtitle" id="last-updated">Loading...</div>
                </div>
                <button id="sort-toggle" class="sort-btn" onclick="toggleSort()">Sort: Date</button>
            </div>

            <div class="order-list" id="order-list">
                <!-- Loading skeleton -->
                <div class="order-item">
                    <div class="order-main">
                        <div class="skeleton" style="width: 140px; height: 16px; margin-bottom: 6px;"></div>
                        <div class="skeleton" style="width: 80px; height: 14px;"></div>
                    </div>
                    <div class="skeleton" style="width: 70px; height: 24px; border-radius: 12px;"></div>
                    <div class="skeleton" style="width: 50px; height: 14px;"></div>
                </div>
            </div>

            <div class="app-footer">
                <span id="last-updated-footer">Walmart Order Tracker</span>
            </div>
        </main>
    </div>

    <script type="module" src="scripts/dashboard.js"></script>
</body>
</html>
